name: Actualizar Quiniela

on:
  schedule:
    # 11 PM CDMX = 04:00 UTC (CDMX es UTC-5)
    - cron: '0 4 * * *'
  workflow_dispatch:  # permite correrlo manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # necesario para hacer commit

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Correr script de actualización
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python update_quiniela.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🏆 Actualización automática $(date -u '+%d %b %Y %H:%M') UTC"
          git push
